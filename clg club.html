<!DOCTYPE html>
<html>
<head>
    <title>College Club Registration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }
        .container {
            width: 400px;
            margin: 50px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
        }
        h1 {
            text-align: center;
        }
        input, select {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
        }
        button {
            width: 100%;
            padding: 10px;
            background: blue;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Club Registration Form</h1>

    <form onsubmit="return registerClub()">
        <input type="text" id="name" placeholder="Student Name" required>

        <input type="text" id="roll" placeholder="Roll Number" required>

        <input type="email" id="email" placeholder="Email" required>

        <select id="club">
            <option>Technical Club</option>
            <option>Cultural Club</option>
            <option>Sports Club</option>
            <option>Literary Club</option>
        </select>

        <button type="submit">Register</button>
    </form>

    <p id="msg"></p>
</div>

<script>
function registerClub() {
    let name = document.getElementById("name").value;
    let club = document.getElementById("club").value;

    document.getElementById("msg").innerHTML =
        "Registration Successful! " + name +
        " joined " + club;

    return false;
}
</script>

</body>
</html>
